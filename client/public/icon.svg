<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main body gradient - 3D effect from light green to dark green -->
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac"/>
      <stop offset="30%" style="stop-color:#4ade80"/>
      <stop offset="70%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>

    <!-- Highlight gradient for shine effect -->
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>

    <!-- Shadow gradient for bottom -->
    <linearGradient id="shadowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.3"/>
    </linearGradient>

    <!-- Eye gradient -->
    <radialGradient id="eyeGradient" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </radialGradient>

    <!-- Eye highlight -->
    <radialGradient id="eyeHighlight" cx="35%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#16a34a" flood-opacity="0.4"/>
    </filter>

    <!-- Outer glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Inner shadow for depth -->
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feOffset dx="0" dy="4"/>
      <feGaussianBlur stdDeviation="4" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="#15803d" flood-opacity="0.4" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Background glow -->
  <ellipse cx="256" cy="300" rx="140" ry="60" fill="#4ade80" opacity="0.15" filter="url(#glow)"/>

  <!-- Ghost body with shadow -->
  <g filter="url(#dropShadow)">
    <!-- Main ghost body -->
    <path
      d="M256 60
         C150 60, 80 150, 80 260
         L80 400
         Q80 420, 100 410
         L120 395
         Q140 380, 160 400
         L175 420
         Q190 440, 210 420
         L230 395
         Q256 365, 282 395
         L302 420
         Q322 440, 337 420
         L352 400
         Q372 380, 392 395
         L412 410
         Q432 420, 432 400
         L432 260
         C432 150, 362 60, 256 60 Z"
      fill="url(#bodyGradient)"
    />

    <!-- Highlight overlay for 3D shine -->
    <path
      d="M256 60
         C150 60, 80 150, 80 260
         L80 300
         Q150 280, 256 280
         Q362 280, 432 300
         L432 260
         C432 150, 362 60, 256 60 Z"
      fill="url(#highlightGradient)"
    />

    <!-- Bottom shadow overlay -->
    <path
      d="M80 340
         L80 400
         Q80 420, 100 410
         L120 395
         Q140 380, 160 400
         L175 420
         Q190 440, 210 420
         L230 395
         Q256 365, 282 395
         L302 420
         Q322 440, 337 420
         L352 400
         Q372 380, 392 395
         L412 410
         Q432 420, 432 400
         L432 340
         Q362 360, 256 360
         Q150 360, 80 340 Z"
      fill="url(#shadowGradient)"
    />
  </g>

  <!-- Left eye -->
  <g>
    <ellipse cx="185" cy="210" rx="40" ry="50" fill="url(#eyeGradient)"/>
    <ellipse cx="175" cy="195" rx="12" ry="15" fill="url(#eyeHighlight)"/>
  </g>

  <!-- Right eye -->
  <g>
    <ellipse cx="327" cy="210" rx="40" ry="50" fill="url(#eyeGradient)"/>
    <ellipse cx="317" cy="195" rx="12" ry="15" fill="url(#eyeHighlight)"/>
  </g>
</svg>
